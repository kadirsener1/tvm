name: IPTV M3U Generator

on:
  workflow_dispatch:  # Manuel çalıştırma
  schedule:
    - cron: '0 3 * * *'  # Her gün saat 03:00'te çalışır (UTC)

jobs:
  generate-m3u:
    runs-on: ubuntu-latest

    steps:
      - name: Repo klonla
        uses: actions/checkout@v3

      - name: PHP kurulumunu yap
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Gerekli PHP dosyasını çalıştır
        run: php olustur.php

      - name: Değişiklikleri GitHub'a yükle
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add kanallar.m3u veriler.php
          git commit -m "GitHub Actions ile otomatik güncellendi" || echo "Değişiklik yok"
          git push
